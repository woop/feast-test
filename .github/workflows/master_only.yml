name: master only tests

on:
  push:
    branches:
      - master

jobs:
  basic-e2e-tests-docker-compose:
    runs-on: ubuntu-latest
    name: basic e2e tests on docker compose
    steps:
      - uses: actions/checkout@v2
      - name: test docker compose
        run: ./infra/scripts/test-docker-compose.sh
