name: notebook

on: [push]

jobs:
  notebook-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        notebook: [basic]
    env:
      OUTPUT_BUCKET_NAME: feast-test-notebook-artifacts
      FEAST_VERSION: 0.6.2
      ALLOW_DELETE_BQ_DATASET: true
      NOTEBOOK: ${{ matrix.notebook }}
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.7'
      - uses: GoogleCloudPlatform/github-actions/setup-gcloud@master
        with:
          version: '290.0.1'
          export_default_credentials: true
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Feast with Docker Compose
        run: |
          export TEMP_BUCKET=gs://${OUTPUT_BUCKET_NAME}
          export TEST_RUN_ID=action_${GITHUB_SHA}_${{ matrix.notebook }}
          ./infra/scripts/setup-docker-compose-infra.sh
      - name: Wait for Docker Compose to come online
        run: |
          source infra/scripts/setup-common-functions.sh
          wait_for_docker_compose_running
      - name: Install dependencies
        run: pip install pytest docker google-cloud-storage
      - name: Test notebook
        run: |
          cd infra/docker-compose/
          docker-compose logs -f -t &
          cd ../..
          python -m pytest --verbose --color=yes tests/notebook/basic.py --test_run_id=${TEST_RUN_ID} --output_bucket_name=${OUTPUT_BUCKET_NAME}
      - name: Get output notebook URL
        run: echo "https://nbviewer.jupyter.org/url/storage.googleapis.com/${OUTPUT_BUCKET_NAME}/${TEST_RUN_ID}/${NOTEBOOK}.ipynb?clear_cache=True"
      - name: Tear down Docker Compose
        run: ./infra/scripts/tear-down-docker-compose-infra.sh