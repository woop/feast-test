name: notebook

on: [push]

jobs:
  notebook-tests:
    runs-on: [ubuntu-latest]
    strategy:
      matrix:
        component: [basic]
    steps:
      - uses: actions/checkout@v2
      - uses: GoogleCloudPlatform/github-actions/setup-gcloud@master
        with:
          version: '290.0.1'
          export_default_credentials: true
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      - name: Run notebook test
        run: |
          FEAST_VERSION=${GITHUB_SHA} \
          NOTEBOOK=${{ matrix.component }} \
          TEST_RUN_ID=action_${GITHUB_SHA}_${{ matrix.component }} \
          ./infra/scripts/test-jupyter-notebooks.sh