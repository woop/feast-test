name: complete workflow

on: [push, pull_request]

jobs:
  build-docker:
    runs-on: [self-hosted, builder]
    name: build-docker
    steps:
      - uses: actions/checkout@v2
      - name: build feast core
        run: make build-core-docker REGISTRY=gcr.io/kf-feast VERSION=${GITHUB_SHA}

  lint-java:
    container: gcr.io/kf-feast/feast-ci:latest
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: lint java
        run: make lint-java

  lint-python:
    container: gcr.io/kf-feast/feast-ci:latest
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run: make install-python-ci-dependencies
      - name: compile protos
        run: make compile-protos-python
      - name: lint python
        run: make lint-python

  lint-go:
    container: gcr.io/kf-feast/feast-ci:latest
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run: make install-go-ci-dependencies
      - name: lint go
        run: make lint-go

  lint-versions:
    container: gcr.io/kf-feast/feast-ci:latest
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run: make lint-versions

  unit-test-java:
    runs-on: ubuntu-latest
    container: gcr.io/kf-feast/feast-ci:latest
    name: unit test java
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v1
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: test java
        run: make test-java-with-coverage
      - uses: actions/upload-artifact@v2
        with:
          name: java-coverage-report
          path: ${{ github.workspace }}/docs/coverage/java/target/site/jacoco-aggregate/

  unit-test-python:
    runs-on: ubuntu-latest
    container: gcr.io/kf-feast/feast-ci:latest
    name: unit test python
    steps:
      - uses: actions/checkout@v2
      - name: install python
        run: make install-python
      - name: test python
        run: make test-python

  unit-test-go:
    runs-on: ubuntu-latest
    container: gcr.io/kf-feast/feast-ci:latest
    name: unit test go
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run: make compile-protos-go
      - name: test go
        run: make test-go
